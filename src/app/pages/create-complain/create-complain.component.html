<div class="panel-body">
  <div class="h3">สร้างคำขอร้องเรียน</div>
  <div class="mt-3">
    <dx-form
      #myform
      [formData]="_formdata"
      [colCount]="2"
      labelLocation="top"
      style="width: 99.5%; margin: auto; padding-top: 10px"
    >
      <dxi-item [colSpan]="2" dataField="COM_NAME" editorType="dxTextBox">
        <dxo-label text="หัวข้อที่ร้องเรียน"></dxo-label>
        <dxi-validation-rule
          type="required"
          message="กรุณากรอกหัวข้อ"
        ></dxi-validation-rule>
      </dxi-item>

      <dxi-item [colSpan]="2" dataField="COM_IDCARD" editorType="dxTextBox"
        [editorOptions]="{ maxLength: 13, mode: 'tel' }">
        <dxo-label text="รหัสบัตรประชาชน"></dxo-label>
        <dxi-validation-rule
          type="required"
          message="กรุณากรอกบัตรประชาชน"
        ></dxi-validation-rule>
      </dxi-item>

      <dxi-item [colSpan]="2" dataField="COM_DETAIL" editorType="dxTextArea">
        <dxo-label text="รายละเอียด"></dxo-label>
      </dxi-item>

      <dxi-item [colSpan]="2" dataField="USER_ID" editorType="dxSelectBox"
        [editorOptions]="{ dataSource: _selectUser, valueExpr: 'USER_ID', displayExpr: 'USER_FULLNAME' }">
        <dxo-label text="ผู้กระทำความผิด"></dxo-label>
      </dxi-item>

      <dxi-item
        [colSpan]="2"
        dataField="COM_USER_DETAIL"
        editorType="dxTextArea"
      >
        <dxo-label
          text="รูปลักษณ์ผู้กระทำผิด(กรณีไม่รู้ชื่อผู้กระทำ)"
        ></dxo-label>
      </dxi-item>
      <dxi-item [colSpan]="2">
        <div class="upload-container">
          <dxo-label text="อัปรูปหลักฐาน"></dxo-label>
          <input
            type="file"
            (change)="onFileSelected($event)"
            accept="image/*"
          />
          <div *ngIf="base64String">
            <img
              *ngIf="base64String"
              [src]="base64String"
              style="
                max-width: 900px;
                max-height: 900px;
                border: 1px solid #ddd;
                border-radius: 4px;
                display: block;
              "
            />
          </div>
        </div>
      </dxi-item>
      <dxi-item [colSpan]="2"></dxi-item>
      <dxi-item
        ><div style="place-items: center">
          <dx-button
            class="btn-back"
            [width]="160"
            [height]="50"
            text="ย้อนกลับ"
            (onClick)="OnBack()"
          ></dx-button>
        </div>
      </dxi-item>
      <dxi-item
        ><dx-button
          class="btn-send"
          [width]="160"
          [height]="50"
          text="ส่งคำขอ"
          [useSubmitBehavior]="true"
          (onClick)="OnSend()"
        ></dx-button
      ></dxi-item>
    </dx-form>
  </div>
</div>
